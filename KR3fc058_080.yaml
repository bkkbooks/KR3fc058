body:
  text: 段少子丑二段故為半句冪二內少半句半股弦較相乘冪二令移補成一直積移乙丙丁戊己補寅移與子及丑同數之庚補卯移壬補辰移癸補巳合辛寅卯辰已成一直積以半句半差內去半股弦較為廣句為袤和內減半較餘即廣不及袤數求袤故以為虛從又有句弦較二百八十八句較和八百九十六問如前此問較短和長相減餘長於較答曰句六百四十股六百七十二弦九百二十八草曰立天元一為句自之得為句冪又置句弦較二百八十八以天元句加之得為弦又置句較和八百九十六以天元句減之得為股弦較以減弦得為股自之得下式為股冪二冪相加得下為弦冪寄左又以弦自之得為同數與左相消得上下俱四約之得下翻法開平方得六百四十即句也依術得股弦合問解曰二數相減餘半之冪甲乙丙丁戊己庚辛壬癸子丑寅卯十四段內減半較冪辰已酉戌艮震六段為半數冪其甲乙丙丁段與半較冪同數故即減甲乙丙丁四段餘半句較和上減去句弦較餘自之羃一壬寅丑卯四段半句較和上減去句弦較餘與半句弦較
  hash: sha256:647ac400a7bd61d6e45fcb9bfda315251833a638f14528dd46e876ddd96d5809
