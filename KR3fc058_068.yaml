body:
  text: 半和即三數并連數也今有句弦和三百六句較較六十八問如前答曰句八十五股二百四弦二百二十一術曰二數相加半之自之為冪內減半和冪餘為正實二蘇相加內減半和為負從一正隅開平方得句以句減和餘為弦以較減句餘為股弦較以減弦餘為股草曰立天元一為句自之得為句冪又置句弦和三百六以天元句減之得下為弦又置句較較六十八以減天元句得為股弦較以減弦得為股自之得下式為股冪二冪相加得下為弦冪寄左又以弦自之得為用數與左相消得上下句四約之得下開平方得八十五即句也依術得股弦合問解曰二數相加半之為一句半股共數其冪內有半句冪四即句冪一半股冪一半句半股相乘冪四即句與半股相乘冪二半和為半句半弦共數其冪內有半句冪一半弦冪一即半句冪一半股冪半句半弦相乘冪二
  hash: sha256:aff1a1e88ad4fcf09c6e95d56361a185075d6cfe39845c53e22367167a82cf6e
