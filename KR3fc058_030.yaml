body:
  text: 得為股冪二冪相加得為弦冪寄左又置弦七十五自之得為同數與左相消得半之得開平方得二十一即句也依術得股合問解曰和冪內有句股相乘冪四較冪一弦冪內有句股相乘冪二較冪一相減餘句股相乘冪二半之為句股相乘冪一又為句與句股和相乘冪內少卻一句冪故以和為從一為虛隅今有弦九十一句股較四十九問如前答曰句三十五股八十四術曰二冪相減餘半之為負實較為正從一正隅開平方得句以句加較得股草曰立天元一為句自之得為句冪又置句股較四十九以天元句加之得下為股自之得為股冪二冪相加得下式為弦冪寄左又置弦九十一自之得為同數與左相消得半之得開平方得三十五即句也依術得股合問解曰如上説弦冪內有較冪一句股相乘冪二減
