body:
  text: 百七十五草曰立天元一為句自之得為句冪又置句股和二百一十七以天元句減之得為股自之得為股冪二冪相加得下式為弦冪寄左又置句和較二百九十四以天元句加之得為股弦和以股減之得為弦自之得下式為同數與左相消得下式上下俱半之得開平方得四十九即句也依術得股弦合問解曰此二數相減餘即弦上減二句也和冪內減二數差冪餘句冪四句與二數差相乘冪四句股相乘冪二半之為句冪二句與二數差相乘冪二句股相乘冪一此積合以一箇句股和兩箇二數差共為從倍較內減和餘即一箇句股和兩箇二數差共也今有句股和五百三十三句較和三百六十四問如前荅曰句二百六十股二百七十三弦
  hash: sha256:0fc2fa9fa40e45a0592bc303ac32df56f5522b1c3db188074213b26a79b428a7
