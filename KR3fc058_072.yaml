body:
  text: 得上下俱四約之得開平方得一百九十八即句也依術得股弦合問又置以翻法平方開之得二百四十為句依術得股弦亦合問今有句弦較一百句和和二百六十四問如前荅曰句二十二股一百二十弦一百二十二術曰二數相減餘半之自之為冪內減半較冪餘為負實二數相減餘加半較為正從一負隅開平方得句以句加較得弦減和餘為股弦和以弦減之餘為股草曰立天元一為句自之得為句冪又置句弦較一百以天元句加之得下式為弦又置句和和二百六十四以天元句減之得為股弦和以弦減之得為股自之得下式為股冪二冪相加得下為弦冪寄左又以弦自之得為同數與左相消得上下俱四約之得下開平方得二十二即句也依術得股弦合問解曰半股冪內有半句弦較冪一半句弦較與句
  hash: sha256:09cd09735308e56556535b84f9e300e1b2bb884d93bcd8a73af951976b763383
