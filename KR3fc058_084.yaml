body:
  text: 申酉戌亥乾坎艮震巺離坤兊甲乙戊金丙丁己石庚辛壬二十七段同數內減半句股較與半股弦較相乘冪二巳段酉艮二段半股弦較冪一戌震二段餘半句與半股弦較相乘冪二絲段竹匏二段即是句與半股弦較相乘冪一竹酉戌亥乾坎匏艮震巺離坤十二段與半句較和上減去句弦較餘自之冪一丁己辛壬四段半句較和上減去句弦較餘與半句弦較相乘冪二未申乾坎離坤六段金石二段半句與半句股較相乘冪二午亥巺甲丙庚六段兊辰乙戊四段其辰段與甲段同數同數內又各減半句與半句股較相乘冪二以減竹段酉戌亥乾坎五段一減午亥巺甲丙庚六段兊辰乙戊四段其辰段與甲段同數餘為半較上減去句股較餘與句相乘冪一匏艮震巺離坤六段與半句較和上減去句弦較餘自之冪一丁己辛壬四段半句較和上減去句弦較餘與半句弦較乘冪二為申坎坎離坤六段石二段同數亦與二冪相減餘戊己癸壬寅丑卯庚辛子十段同數此二冪相減餘變為一直積匏艮震巺離坤六段以半較上減去句股較餘為廣句為袤和內減半較為從即是廣袤共數故以一為虛隅求袤故以翻法入之又有句弦較二百九十四句較和四百六十八問如前此問較短和長相減餘短於較荅曰句三百六十股五百四十六弦
