body:
  text: 半股弦較冪四半句半股弦較相乘冪四半句股較半股弦較相乘冪八其半股弦較冪一半句半股弦較相乘冪二半句股較半股弦較相乘冪二與半句冪同數半股弦較冪四半句半股弦較相乘冪八半句股較半股弦較相乘冪八與四段半句冪即一段句冪同數今減餘止有半句半股弦較相乘冪四是於四段半句冪內少却四段半句半股弦較相乘冪也即句冪內少却句與股弦較相乘冪并連為一直積以句上去股弦較餘為廣句為袤故以股弦較為虛從句股算術細草
