body:
  text: 術曰二冪相減餘半之為實較為法法除實得句以句加較得弦草曰立天元一為句自之得為句冪又置股五十五自之得為股冪二冪相加得為弦冪寄左又置句弦較二十五以天元句加之得為弦自之得下為同數與左相消得下半之得上實下法得四十八即句也依法得弦合問解曰此與句股弦較同義亦句股互異今有弦七十五句股和九十三問句股各幾何答曰句二十一股七十二術曰二冪相減餘半之為負實和為正從一負隅開平方得句以句減和餘為股草曰立天元一為句自之得為句冪又置句股和九十三以天元句減之得為股自之
  hash: sha256:979a109288aff574683de48058f027f37a8516f2373686a76bfe38dfcd133e85
