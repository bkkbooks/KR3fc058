body:
  text: 冪餘句冪四句弦相乘冪四句股相乘冪二半之為句冪二句弦相乘冪二句股相乘冪一并連為一以句為廣以二句二弦一股為袤倍二數相減餘加較得三句二弦一股為廣袤共數故以一為虛隅今有句股較五百五十三句較較一百二十六問如前此問句股較長句較較短相減餘長於句較較答曰句一百四十股六百九十三弦七百七術曰二數相減餘自之為冪以減句股較冪餘半之為負實不足減反減之餘半之為正實以翻法開之倍句較較以減句股較餘為正從不足減反減之餘為負從一正隅開平方得句以句加句股較得股以句較較減句餘為股弦較以股加之得弦草曰立天元一為句自之得為句冪又置句股較五百五十三以天元句加之得為股自之得為股冪二冪相加得下式為弦冪寄左又置句較較一百二十六以減天元
