body:
  text: 解曰大和冪內有句冪一弦冪一句弦相乘冪二小和冪內有句冪一股冪一句股相乘冪二於大和冪內減小和冪其句冪適盡其大和弦冪內減小和股冪餘有句冪在其大和句弦相乘冪二內減小和句股相乘冪二餘有句與股弦較相乘冪二在故以股弦較倍之為從二數相減餘即股弦較一為隅也今有句股和三百四十一句弦較一百九十八問如前荅曰句七十七股二百六十四弦二百七十五術曰二冪相減餘為負實二數相加倍之為正從一負隅開平方得句以句減和餘為股加較得弦草曰立天元一為句自之得為句冪又置句股和三百四十一以天元句減之得為股自之得為股冪二冪相加得下式為弦冪寄左又置句弦較一百九十八以天元句加之得為弦自之得下為同數與左相消息得下式開平方得七十七即句也依
  hash: sha256:fba16b3b35902ee320fb635277eb51e574002024568b05c7411d9a59d39b4769
