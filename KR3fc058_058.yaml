body:
  text: 句得為股弦較以股加之得為弦自之得下為同數與左相消得下上下俱半之得下翻法開平方的三百二十即句也依術得股弦合問解曰句較較冪甲乙丙丁戊己庚辛壬癸子丑寅卯十四段內減句弦較股弦較相乘冪甲乙二段餘為半段句較較冪丙丁戊己庚辛壬癸子丑寅卯十二段今於二數差冪甲乙丙丁戊己庚辛壬癸十段內減句股較冪癸段餘為句較較冪甲乙丙丁戊己庚辛壬癸子丑寅卯十四段內少缺兩段二數相乘冪子丑寅三段癸卯二段半之為半段句較較冪丙丁戊己庚辛壬癸子丑寅卯十二段內少却一段二數相乘冪子丑寅三段此半段句較較冪減却一段二數相乘冪丙丁戊己庚辛壬癸卯九段內有句較較上去句弦較與股弦較相乘冪一丙戊二段句較較上去句弦較與句股較相乘冪一丁己二段句較較上去句弦較與二數差相乘冪一庚辛壬癸卯五段令移補成一直積移丙戊補辰移丁己補丑寅合辰庚辛壬癸丑寅卯八段成一直積以
