body:
  text: 成一直積移丙補乙移戊補丑移丁補癸子合丑乙子寅癸庚六段成一直積以句為廣以二數差與股弦較相并為袤於袤內減句餘為二數差內減去句較較為從倍句較較以減句股較餘即二數差內去句較較也又有句股較四十九句較較四十二問如前問句較長句較較短相減餘短於句較較答曰句五十六股一百五弦一百一十九草曰立天元一為句自之得為句冪又置句股較四十九以天元句加之得下為股自之得為股冪二冪相加得為弦冪寄左又置句較較四十二以減天元句得為股弦較以股加之得為弦自之得下式為同數與左相消得下上下俱半之得下開平方得五十六即句也依術得股弦合問解曰句股較冪甲乙丙丁戊己六段內減二數差冪己段餘為句較較冪一甲乙二段句較較二數差相乘冪二丙一段丁戊二段又為句弦較股弦較相乘冪二庚辛壬三段癸一段句較較二數差相乘冪二丙一段丁戊二段半之為句弦較
