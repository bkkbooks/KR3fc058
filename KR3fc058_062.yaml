body:
  text: 較較二數差相乘冪辛壬癸三段餘有股弦較上去二數差與句股較相乘冪一辛段股弦較上去二數差與股弦較相乘冪一壬段股弦較上去二數差與二數差相乘冪一癸段令移補成一直積移辛補寅移壬補辰移癸補卯合寅卯辰三段成一直積以股弦較上去二數差為廣句為袤廣袤相減餘為虛從倍句較較內減句股較即是廣袤相減餘也今有句弦和六百七十六句和較五百六十問如前此問和長較短荅曰句二百四十股三百六十四弦四百三十六術曰二數相減餘為正從一正隅開平方得為負實較內減半和餘為正從一正隅開平方得句以句減和餘為弦加較得股弦和以弦減之餘為股草曰立天元一為句自之得為句冪又置
  hash: sha256:da2a960f2d587a22d844e337624cfcf51a4bb2b31e8f87592ca753430961290f
