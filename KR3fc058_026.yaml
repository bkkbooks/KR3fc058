body:
  text: 一股乘較冪二句冪內減較冪餘股乘較冪二半之為股乘較冪一故以較除之得股今有股四十五句弦和七十五問句弦各幾何答曰句二十四弦五十一術曰二冪相減餘半之為實和為法法除實得句以句減和餘為弦草曰立天元一為句自之得丨為句冪又置股四十五自之得為股冪二冪相加得為弦冪寄左又置句弦和七十五以天元句減之得為弦自之得為同數與左相消得下式半之得下式上實下法得二十四即句也依術得弦合問解曰此與句股弦和術同義惟句股異耳今有股五十五句弦較二十五問如前答曰句四十八弦七十三
  hash: sha256:ad4be25cba6395e16860e49854e2fb7695e2157315cf22cf2627143ac4fcee6d
