body:
  text: 較冪餘句股相乘冪二半之為句股相乘冪一又為句冪一句與句股較相乘冪一故以較為從一為隅今有句股和四百五十一句弦和五百三十九問句股弦各幾何答曰句二百二十股二百三十一弦三百一十九術曰二冪相減餘為正實二數相減餘倍之為負從一負隅開平方的句以句減小和餘為股減大和餘為弦草曰立天元一為句自之得為句冪又置句股和四百五十一以天元句減之得為股自之得為股冪二冪相加得下式為弦冪寄左又置句弦和五百三十九以天元句減之得為弦自之得下為同數與左相消得下式開平方的二百二十即句也以句二百二十減句股和四百五十一餘二百三十一即股也又以句二百二十減句弦和五百三十九餘三百一十九即弦也合問
  hash: sha256:48e53748df10c87c0992f8c27bb9219485ebad124d36b3610b838191b5994266
