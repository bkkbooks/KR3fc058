body:
  text: 句較較上去句弦較為廣句為袤倍句較較內減句股較為從即是廣袤共數兹求袤故以翻法入之又有句股較六十二句較較八十四問如前此問句股較短句較較長相減餘短於句股較荅曰句一百二十股一百八十二弦二百一十八草曰立天元一為句自之得為句冪又置句股較六十二以天元句加之得下為股自之得為股冪二冪相加得下式為弦冪寄左又置句較較八十四以減天元句得下為股弦較以股加之得為弦自之得下為同數與左相消得下式上下俱半之得益積開平方得一百二十即句也依術得股弦合問解曰句股較冪甲乙丙丁四段內減二數差冪丁段餘為句較較冪甲乙丙丁戊己庚七段內少缺兩段句較較二數差相乘冪庚戊二段丁己二段半之為半段句較較冪辛壬癸子丑五此段本句弦較股弦較相乘冪與半年段句較較冪同數內少却一段句較較二數差相乘冪子丑二段此半段句較較冪內減去句
