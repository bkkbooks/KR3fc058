body:
  text: 相乘冪一股冪內有較冪一句與較相乘冪二又為半較冪四句與半較相乘冪四半股冪為股冪四分之一股為半較冪一半較與句相乘冪一二數相減餘半之為一句半股共數其冪內有句冪一半股冪一句與半股相乘冪二以半較冪減子餘句冪一句與半股相乘冪二句與半較相乘冪一并連為一直積以句為廣以一句一股半較共為袤二數相減餘加半較為從即是廣袤共數故以一為虛隅今有句弦較六百四十八句較和一百七十六問如前此問較長和短相減餘長於和荅曰句一百六十股七百九十二弦八百八術曰二數相減餘半之自之為冪以減半較冪餘為負實不足減反減之餘為正實以翻法開之半較內減和餘為正從不足減反減餘為負從一正隅開平方得句以句加較得弦減和餘為股弦較以減弦餘為股草曰立天元一為句自之得為句冪又置句弦較六百四十八以天元句加之得為弦又置句較和一百七十六以天元句減之得
