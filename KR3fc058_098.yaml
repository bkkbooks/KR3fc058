body:
  text: 加股弦和得半之得為弦自之得下為同數與左相消得下式開平方得四十四即句也依術得股弦合問解曰半二數并為一弦半句共其冪內有半句冪一半弦冪四半句半弦相乘冪四半二數差為一股半句共其冪內有半句冪一半股冪四半句半股相乘冪四於半二數并冪內減半二數差冪餘半句冪四即句冪一半句半股弦較相乘冪四即句與股弦較相乘冪一并連為一直積以句為廣以句與股弦較共為袤股弦較為袤多於廣數故以為從今有股弦較一十二句和較一千八十問如前荅曰句一百二十股五百九十四弦六百六術曰二數相減餘半之自之為冪二數相加半之自之為冪二冪相減餘為負實股弦較為負從一正隅開平方得句以句加句和較得股弦和內減
