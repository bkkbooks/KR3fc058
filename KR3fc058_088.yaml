body:
  text: 子丑二段其半股弦較冪一壬癸二段半股半股弦較相乘冪二震申乾坎艮己六段巺離丑子庚辛六段與半句冪午未申兊巳酉乾金辰戌坎石卯亥艮絲寅戊己竹丑庚壬匏子辛癸土坤乙三十段同數內減半股弦較冪一壬癸二段半股弦較半句股較相乘冪二申乾坎艮己五段丑子庚辛四段餘半句半股弦較相乘冪二震段巺離二段與半較半差相減餘冪一卯辰巳午四段半較半差相減餘與半較半句相減餘相乘冪二未酉戌亥四段寅段半較半句相減餘與半句相乘冪二兊金石絲竹匏土乙八段坤戊二段戊段與乙段同數同數又半句半股弦較相乘冪二震段巺離二段與句與半股弦較相乘冪巺離丑子庚辛壬癸匏土十段同數半句與半較半句相減餘相乘冪二兊金石絲竹匏土乙八段坤戊二段與句與半較半句相減餘相乘冪巺丑庚壬匏五段同數以減句與半股弦較相乘冪巺離丑子庚辛壬癸匏土十段餘為前率離子辛癸土五段其革午未申兊五段同數與半較半差相減餘冪一卯辰巳午四段半較半差相減餘與半較半句相減餘相乘冪二未酉戌亥四段兊金石絲四段其兊金石絲四段與寅段同數同數又半較半差相減餘又半之與句相乘冪革木午巳未酉申乾隆金十段與半差相減餘又半之與句相乘冪午未申兊巳酉乾金辰戌坎石卯亥艮絲十六段同數於半較半差相減餘又半之與句相乘冪革木午巳未酉申乾兊金十段內減前率
