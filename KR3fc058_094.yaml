body:
  text: 答曰句二十六股一百六十八弦一百七十術曰二數相減半之自之為冪二數相加半之自之為冪二冪相減餘為負實和為正從一負隅開平方得句以較減之餘為股弦較以減和餘半之得股加和半之得弦草曰立天元一為句自之得為句冪又置句較較二十四以減天元句得下式為股弦較又置股弦和三百三十八以股弦較減之得半之得下為股自之得下式為股冪二冪相加得為弦冪寄左又置股弦和三百三十八以股弦較加之得下半之得下為弦自之得下式為同數與左相消得下開平方的二十六即句也依術得股弦合問解曰半股冪內有半句弦較冪一半句半句弦較相乘冪二半二數并為半句一股共其冪內有半句冪一半股冪四把句半股相乘冪四半二數差為半句一句弦較共其冪內有半句冪一半句弦較冪四半句半句弦較相乘冪四於半二數并冪
