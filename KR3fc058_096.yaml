body:
  text: 內減半二數差冪餘半句半股相乘冪四即句股相乘冪一半句半句弦較相乘冪四即句與句弦較相乘冪一并連為一直積以句為廣以股與句弦較共為袤股弦和即廣袤共數故以為從一為虛隅今有股弦較四句和和五百二十八問如前荅曰句四十四股二百四十弦二百四十四術曰二數相減半之自之為冪二數相加半之自之為冪為冪相減餘為負實較為正從一正隅開平方得句以句減和餘為股弦和內減較餘半之得股加較半之得弦草曰立天元一為句自之得為句冪又置句和和五百二十八以天元句減之得為股弦和又置股弦較四以減股弦和得下半之得為股自之得為股冪二冪相加得下式為弦冪寄左又置股弦較四以
