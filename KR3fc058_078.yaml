body:
  text: 餘為袤半較內減和餘即廣不及袤數故以為從又有句弦較四十句較和三十問如前此問較長和短相減餘短於和答曰句二十五股六十弦六十五草曰立天元一為句自之得為句冪又置句弦較四十以天元句加之得下式為弦又置句較和三十以天元句減之得下式為股弦較以減弦得下式為股自之得下式為股冪二冪相加得下為弦冪寄左又以弦自之得為同數與左相消得上下俱四約之得下開平方得二十五即句依術得股弦合問解曰如前半股弦較冪一乙段半股半股弦較相乘冪二丙已丑三段子戊丁三段與半句冪同數與半較冪甲乙丙丁戊已庚辛壬癸十段內減半差冪甲段餘半句半差相乘冪二壬段癸段半句冪二內少半句半股弦較相乘冪二庚辛二段為半句冪一乙丙丁戊己子丑七段亦為半句冪一子丑二段解為半句半股弦較相乘冪今減餘止有乙丙丁戊己五
