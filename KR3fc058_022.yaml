body:
  text: 冪相減餘一千二百九十六為實開平方的三十六即股也合問解曰觀前圖自明今有股二百四十弦二百四十六問句幾何荅曰五十四術曰二冪相減餘為實開平方得句草曰置股二百四十自之得五萬七千六百為股冪又置弦二百四十六自之得六萬五百一十六為弦冪二冪相減餘二千九百一十六為實開平方得五十四即句也合問解曰觀前圖自明今有句一十二股弦和七十二問股弦各幾何荅曰股三十五弦三十七術曰二冪相減餘半之為實和為法法除實得股以股減和餘為弦草曰立天元一為股自之得丨為股冪又置句一十二自之得為句冪二冪相加得為弦冪寄左又置股弦和七十二以天元股減之得為弦自之得下為同數與左相消得下式上下俱半之得上實下法得三
  hash: sha256:7ce6327ab09a7d2cd9ea5e27ebbd412b711d8d49c855ea1c15ea61432263052e
