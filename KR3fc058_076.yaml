body:
  text: 為股弦較以減弦得為股自之得下式為股冪二冪相加得下為弦冪寄左又以弦自之得為同數與左相消得上下俱以四約之得開平方得一百六十即句也依術得股弦合問解曰半股弦較冪一乙段半股弦較與半股相乘冪二丁己癸三段壬戊丙三段此丁乙己癸四段壬戊乙丙四段本皆為半股弦較與半弦相乘冪內各去半股弦較冪乙段餘丁己癸三段壬戊丙三段皆為半股弦較與半股相乘冪與半句冪同數弦冪內減股冪餘股弦較冪一股與股弦較相乘冪二與句冪同數故於半較冪甲乙丙丁戊己庚辛子丑寅申酉十三段內減二數差半之冪甲段餘半句冪四寅申酉三段為三箇半句冪庚辛三段與壬癸二段同數則乙丙丁戊己庚辛七段亦為一箇半句冪故有半句冪四半句與半較內減和相乘冪二子段丑段令移補成一直積移申補辰移補卯移乙丙丁戊己庚辛補巳移子補午移丑補未合寅卯辰巳午六段成一直積以句為廣以一句半較內減和
