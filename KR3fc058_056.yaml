body:
  text: 股弦較相乘冪一庚辛壬三段句較較二數差相乘冪一丙段此句弦較股弦較相乘冪庚辛壬三段內有股弦較句較較相乘冪一庚段股弦較二數差相乘冪一辛段股弦較冪一壬段令移補成一直積先移丙補乙移庚補子丙移辛補寅戊移壬補丑己合丑己子丙寅戊乙氣短為一直積此直積以股弦較與二數差相加為廣句袤以廣減袤餘為句較較上去二數差為虛從倍句較較內減句股較餘即句較較上去二數差也又有句股較一十六句較較一百九十二問如前此問句股較短句較較長相減餘長於句股較答曰句三百二十股三百三十六弦四百六十四草曰立天元一為句自之得為句冪又置句股較一十六以天元句加之得下為股自之得下為股冪二冪相加得下式為弦冪寄左又置句較較一百九十二以減天元
