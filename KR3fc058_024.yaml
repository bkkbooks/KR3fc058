body:
  text: 十五即股也以股三十五減股弦和七十二餘三十七即弦也合問解曰和冪內有股冪一線冪一股弦相乘冪二和冪內減句冪其餘為股冪二弦冪內減句冪餘股冪股弦相乘冪二半之為股冪一股弦相乘冪一并連二冪即是一段股與股弦和相乘冪故以和除之得股今有句三十三股弦較一十一問如前荅曰股四十四弦五十五術曰二冪相減餘半之為實較為法法除實得股以股加較得弦草曰立天元一為股自之得丨為股冪又置句三十三自之得為句冪二冪相加得丨為弦冪寄左又置股弦較一十一以天元股加之得為弦自之得下為同術於左相消得下式上下俱半之得下上實下法得四十四即股也以股四十四加股弦較一十一得五十五即弦也合問解曰弦冪內減股冪餘為句冪此句冪內有較冪
