body:
  text: 句弦和六百七十六以天元句減之得為弦又置句和較五百六十以天元句加之得下為股弦和以弦減之得為股自之得下為股冪二冪相加得下式為弦冪寄左又以弦自之得為同數與左相消得上下俱四約之得開平方得二百四十即句也依術得股弦合問解曰此二數相減餘半之為半句上去半句股較也以其冪減半和冪餘為半句冪四半句股較半句相乘冪四半句股較冪半句股較半差相乘冪并之為半句股較半句相乘冪半句弦較半句相乘冪二又為句冪一句股較與句相乘冪一半句弦較與句相乘冪一并連為一直積以句為廣以一句一句股較半句弦較為袤合以一句股較半句弦較為從較內去半和餘即一句股較半句弦較共也又有句弦和二百八十八句和較三百七十八問如
