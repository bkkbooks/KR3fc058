body:
  text: 説弧矢者肇於九章方田自是以後北宋沈括以兩矢羃求弧背元代李冶用三乘方取矢度引信觸類厥法綦詳矣明顧箬溪應祥作弧矢算術既如積之未明徒開方之是衍務未遺本不亦乎銳受學師門泛觀古籍研九數者十年冀千慮之一得爰集弧矢之問入以天元之法凡十三術都為一卷願與海內游藝之士共審正焉元和李銳
