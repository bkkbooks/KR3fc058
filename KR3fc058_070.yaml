body:
  text: 即半句半股相乘冪二半句半股弦較相乘冪二二冪相減餘半句半股相乘冪二半句半句較較相乘冪二并連為一直積一面為句一面為半股半句較較共數二數相加內減半和為從即是一句半股半句較較共數故以一為虛隅又有句弦和五百八十八句較較一百四十四問如前此問二荅荅曰句一百九十八股三百三十六弦三百九十又荅曰句二百四十股二百五十二弦三百四十八草曰立天元一為句自之得為句冪又置句弦和五百八十八以天元句減之得為弦又置句較較一百四十四以減天元句得下為股弦較以減弦得為股自之得下式為股冪二冪相加得下為弦冪寄左又以弦自之得為同數與左相消
