body:
  text: 吾友李尚之精法算著句股算術細草一卷舉和較相求七十餘事以草五術御之斯亦簡矣至其圖解精深鉤稽離合窮極幼眇使廣袤相形虛法成實義非藏心於密運術於神者孰能言之若是其明且乎蓋李敬齊益古演段一洗術家溟涬之陋矣而猶不免於疏略好學深思之士得尚之書而讀之古學之興庶有冀也因亟為梓之廣其傅焉嘉慶丁卯四月十三日陽城張敦仁識於無錫舟中
  hash: sha256:6afcfd2ddcdb99d9e1d473710e1cf186fbcf9521f20d65d11a63c24b91b988eb
