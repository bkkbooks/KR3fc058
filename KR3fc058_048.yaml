body:
  text: 半之為句冪二句弦相乘冪一句與股弦較相乘冪一并連為一以句為廣二句一弦一股弦較為袤倍二數相加內減大和餘即廣袤并數故以一為虛隅今有句股較六十三句和和二百七十問如前答曰句四十五股一百八弦一百一十七術曰二數相減餘自之為冪內減較冪餘半之烏負實倍二數相減餘加較為正從一負隅開平方得句以句加較得股減和餘為股弦和以股減之餘為弦草曰立天元一為句自之得為句冪又置句股較六十三以天元句加之得為股自之得為股冪二冪相加得下式為弦冪寄左又置句和和二百七十以天元句減之得為股弦和以股減之得為弦自之得下為同數與左相消得下式上下俱半之得開平方得四十五即句也依術得股弦合問解曰二數相減餘為二句一弦共數其冪內減較
