body:
  text: 句得為股弦較以股加之得為弦自之得為同數與左相消得下式上下俱半之得開平方得一百四十即句也依術得股弦合問解曰此句較較冪甲乙二段與句弦較股弦較相乘冪二丙丁戊三段己一段同數弦冪內減股冪餘股弦較冪一股乘股弦較冪二即句冪故於句股較冪甲乙庚寅辛丑卯壬癸子十段內減二數差冪壬癸子三段餘為句較較冪一甲乙二段句較較二數差相乘冪二庚寅二段辛丑卯三段又為句弦較股弦較相乘冪二丙丁戊三段己一段句較較二數差相乘冪二庚寅二段辛丑卯三段半之為句弦較股弦較相乘冪一丙丁戊三段句較較二數差相乘冪一庚寅二段其句弦較股弦較相乘冪丙丁戊二段內有股弦較句較較相乘冪一丙段股弦較二數差相乘冪一丁段股弦較冪一戊段令移補
