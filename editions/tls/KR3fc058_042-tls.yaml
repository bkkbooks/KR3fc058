body:
  text: 之得為同數與左相消得上下俱半之得下式開平方得九十六即句也依術得股弦合問解曰此二數相減餘為弦上去兩箇句弦較也和冪內有句冪一股冪一句股相乘冪二其句冪一股冪一并為弦冪一於和冪內減二數差冪餘句弦較冪四句弦較與二數差相乘冪四句股相乘二又為句與句弦較相乘冪四一段句弦較冪一段句弦較與二數差相乘冪并之為一段句與句弦較相乘冪句股相乘冪二半之為句與句弦較相乘冪二句股相乘冪一其句股相乘冪又為句冪一句與句股較相乘冪一此積合以一箇句股較兩箇句弦較共為從倍較內減和餘即一箇句股較兩箇句弦較共也又有句股和二百一十七句和較二百九十四問如前此問和短較長荅曰句四十九股一百六十八弦一
