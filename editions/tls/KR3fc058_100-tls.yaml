body:
  text: 股弦較餘半之得股加股弦較半之得弦草曰立天元一為句自之得為句冪又置句和較一千八十一天元句加之得為股弦和又置股弦較一十二以減股弦和式得下半之得為股自之得為股冪二冪相加得下式為弦冪寄左又置股弦較一十二以加股弦和得半之得為弦自之得下為同數與左相消得下筭式開平方得一百二十即句也依術得股弦合問解曰半二數并為半句一句股較一股弦較共其冪內有半句冪一半句股較冪四半股弦較冪四半句半句股較相乘冪四半句半股弦較相乘冪四半句股較半股弦較相乘冪八半二數差為半句一句股較共其冪內有半句冪一半句股較冪四半句半句股較相乘冪四於半二數并冪內減半二數差冪餘
