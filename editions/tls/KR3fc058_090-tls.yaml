body:
  text: 革午未申兊五段餘為后率木巳酉乾金五段其春辰戌坎石五段同數與半較半差相減餘與半股弦較相乘冪申乾坎艮四段或子丑二段同數倍后率木巳酉乾金五段春辰戌坎石五段加前率革午未申兊五段與半較半差相減餘與半句相乘冪一午巳辰卯未酉戌亥申乾坎艮兊金石絲十六段其兊金石絲四段與寅段同數半較半差相減餘與半股弦較相乘冪一丑子二段同數此半較半差二冪相減餘變為一直積革木春午巳辰未酉戌申乾坎兊金石十五段以和內減半較餘以減句所餘為廣句為袤故以和內減半較餘為虛從今有股弦和一百四十四句較和二十八問如前荅曰句二十四股七十弦七十四術曰二數相減半之自之為冪二數相加半之自之為冪二冪相減餘為正實股弦和為負從一負隅開平方得句以句減句較和餘為股弦較以減股弦和餘半子得股以加股弦和半之得弦草曰立天元一為句自之得為句冪又置句較和二十八以天元句減之得下為股弦較又置股弦和一百四十四以股弦較減之得半之得為股以自之得下式為股冪二冪相加得為弦冪寄左又置股
