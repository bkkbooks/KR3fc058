body:
  text: 弦和一百四十四以股弦較加之得半之得為弦自之得下式為同數與左相消得下開平方的二十四即句也依術得股弦合問解曰半二數并為一弦半句共其冪內有半句冪一半弦冪四半句半弦相乘冪四半二數差為一句股較半句共其冪內有半句冪一半句股較冪四半句半句股較相乘冪四於半二數并冪內減半二數差冪餘半句冪四即句冪一半句半股相乘冪四即句股相乘冪一半句半弦相乘冪四即句弦相乘冪一并連為一直積以句為廣以句股弦三事和為袤股弦和即是袤多於廣數故以為從今有股弦和三百三十八句較較二十四問如前
