body:
  text: 三百七十七術曰二數相加自之為冪內減大和冪餘半之為正實倍二數相加內減大和餘為負從一正隅開平方得句以句減大和餘為股減小和餘為股弦較以股加之得弦草曰立天元一為句自之得為句冪又置句股和五百三十三以天元句減之得為股自之得為股冪二冪相加得下式為弦冪寄左又置句較和三百六十四以天元句減之得為股弦較以股加之得為弦自之得為同數與左相消得上下俱半之得下式開平方得二百六十即句也依術得股弦合問解曰二數相加為二句一弦共數其冪內有弦冪一句冪四句弦相乘冪四其大和冪內有句冪一股冪一句股相乘冪二二冪相減餘句冪四句弦相乘冪二句與股弦較相乘冪二
  hash: sha256:219d20ad4cf150302aa3d0c8f99ec04882b7f030018729d5b791815beb09bc7e
