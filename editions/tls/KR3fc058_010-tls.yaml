  text: 弦句弦和以弦減和餘即句依句弦術入之弦句弦較以較減弦餘即句依句弦術入之弦股弦和以弦減和餘即股依股弦術入之弦股弦較以較減弦餘即股依股弦術入之句股和句股較和較相加半之即股相減餘半之即句依句股術入之句股和句弦和求句股弦句股和句弦較求句股弦句股和股弦和二和相減餘即句弦較依句股和句弦較術入之句股和股弦較和較相加即句弦和依句股和句弦和術入之句股較句弦和求句股弦句股較句弦較求句股弦句股較股弦和和較相減餘即句弦和依句股較句弦和術入之句股較股弦較二較相加即句弦較依句股較句弦較術入之句弦和句弦較和較相加半之即弦相減餘半之即句依句弦術入之
