body:
  text: 句弦和股弦和二和相減餘即句股較依句股較句弦和術入之句弦和股弦較和較相減餘即句股和依句股和句弦和術入之句弦較股弦和和較相減餘即句股和依句股和句弦較術入之句弦較股弦較二較相減餘即句股較依句股較句弦較術入之股弦和股弦較和較相加半之即弦相減餘半之即股依股弦術入之句句和和凡股和和絃和合皆與句和合同不別出以句減和餘即股弦和依句股弦和術入之句句和較反股較和弦較和皆與句和較同不別出以句加較即股弦和依句股弦和術入之句句較和反股和較弦較較皆與句較和同不別出以句減和餘即股弦較依句股弦較術入之句句較較凡股較較弦和較皆與句較較同不別出以較減句餘即股弦較依句股弦較術入之股句和和以股減和餘即句弦和依股句弦和術入之
