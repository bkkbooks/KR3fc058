body:
  text: 得為弦自之得下為同數與左相消得下式開平方的七十二即句也依術得股弦合問解曰大較冪內減小較冪餘與二虛積并恰成一段句冪弦冪內去股冪餘句冪故此二虛積皆以句為袤股弦較為廣故以二數相減餘倍之為虛從二數相減餘即股弦較今有句股和二百六句和較一百六十問如前此問和長較短荅曰句九十六股一百一十弦一百四十六術曰二數相減餘自之為冪以減和冪半之為負實倍較內減和餘為正從一正隅開平方得句以句減和餘為股加較得股弦和以股減之餘為弦草曰立天元一為句自之得為句冪又置句股和二百六以天元句減之得為股自之得下為股冪二冪相加得下式為弦冪寄左又置句和較一百六十以天元句加之得為股弦和以股減之得為弦句
