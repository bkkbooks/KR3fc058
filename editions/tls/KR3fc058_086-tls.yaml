body:
  text: 六百五十四草曰立天元一為句自之得為句冪又置句弦較二百九十四以天元句加之得為弦又置句較和四百六十八以天元句減之得為股弦較以減弦得為股自之得下式為股冪二冪相加得下為弦冪寄左又以弦自之得為同數與左相消得上下俱四約之得下益積開平方得三百六十即句也依術得股弦合問解曰半較冪午未申巳酉乾辰戌坎卯亥艮寅戊己丑寅壬子辛癸二十一段內減半差冪半差冪本甲乙丙丁四段今減與半差冪同數之戊己庚辛壬癸六段餘半較半差相減餘冪一卯辰巳午四段半較半差相減餘與半較半句相減餘相乘冪二未酉戌亥四段寅段半較半差相減餘與半股弦較相乘冪二申乾坎辰四段
