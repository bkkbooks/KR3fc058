body:
  text: 前此問和短較長荅曰句六十三股二百一十六弦二百二十五草曰立天元一為句自之得為句冪又置句弦和二百八十八以天元句減之得為弦又置句和較三百七十八以天元句加之得為股弦和以弦減之得為股自之得下為股冪二冪相加得下式為弦冪寄左又以弦自之得為同數左相消得上下俱四約之得開平方得六十三即句也依術得股弦合問解曰此二數相減餘半之為半股上去句也以其冪減半和冪餘為半句冪十半差半句相乘冪四半弦上去句與半句相乘冪二又為二段半句冪一段二數差與句相乘冪一段半弦上去句與句相乘冪此積合以一句有半一箇二數差一箇半弦上去句三數并連為從較內減
  hash: sha256:e567ead4de34fbf130078e60bc3c7ebb172ccf23e43f5dfad6bba70d7ccb294a
