body:
  text: 句較和句較較和較相加半之即句相減餘半之即股弦較依句股弦較術入之今有句二十一股二十八問弦幾何答曰三十五術曰二冪相加為實開平方得弦草曰置句二十一自之得四百四十一為句冪又置股二十八自之得七百八十四為股冪二冪相加得一千二百二十五為實開平方得三十五即弦也合開解曰句自乘為朱冪股自乘為青冪令出入相補恰成一段弦冪故二冪相加開方得弦也今有句一十五弦三十九問股幾何答曰三十六術曰二冪相減餘為實開平方得股草曰置句一十五自之得二百二十五為句冪又置弦三十九自之得一千五百二十一為弦冪二
