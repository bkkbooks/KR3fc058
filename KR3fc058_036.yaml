body:
  text: 術得股弦合問解曰和冪內有句冪一股冪一句股相乘冪二其股冪又為較冪一句與較相乘冪二弦冪內去句冪餘即股冪故和冪內減較冪餘句冪一句股相乘冪二句較相乘冪二并連為句與一句二股二較共數相乘冪又為句與二句二股二較共數相乘冪內少一句冪故以二和二較共為從一虛隅今有句股較六十二句弦和一百問如前答曰句一十八股八十弦八十二術曰二冪相減餘為正實二數相加倍之為負從一負隅開平方得句加較得股減和餘為弦草曰立天元一為句自之得為句冪又置句股較六十二以天元句加之得下為股自之得為股冪二冪相加得下式為弦冪寄左又置句弦和一百以天元句減之得下為弦自之得為同數與左相消得下
  hash: sha256:69e7eccdd03497c85fedd7257defab4e63fae247713dc497e3397c9d05340949
