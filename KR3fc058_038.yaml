body:
  text: 開平方得一十八即句也依術得股弦合問解曰和冪內有句冪一弦冪一句弦相乘冪二其弦冪又為較冪一句股相乘冪二和冪內減較冪餘句冪一句股相乘冪二句弦相乘冪二并連為一以句為廣以一句二股二弦共為袤故以二數相加倍之為從二數相加即股弦和倍之為二股二弦共數今有句股較六十三句弦較八十一問如前答曰句七十二股一百三十五弦一百五十三術曰二冪相減餘為負實二數相減餘倍之為負從一正隅開平方得句以句加小較得股加大較得弦草曰立天元一為句自之得為句冪又置句股較六十三以天元句加之得下為股自之得下為股冪二冪相加得下式為弦冪寄左又置句弦較八十一以天元句加之
