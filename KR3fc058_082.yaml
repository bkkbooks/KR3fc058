body:
  text: 相乘冪二戊己癸三段庚辛子三段其半句冪辰巳午未申酉戌亥乾坎艮震巽離坤兊甲乙戊金丙丁己后庚辛壬二十七段內亦有半句較和上減去句弦較餘自之冪一丁己辛壬四段與壬寅丑卯四段同數半句較和上減去句弦較與半句弦較相乘冪二未申乾坎離坤六段金石二段與戊己癸三段庚辛子三段同數與二冪相減餘戊己癸壬寅丑卯庚辛子十段同數又有半句與半句股較相乘冪二午亥巺甲丙庚六段兊辰乙戊四段其辰段與甲段同數解為半句股較冪一半句股較與半股弦較相乘冪二巳段酉艮二段半股弦較冪一戌震二段為半句冪辰巳午未申酉戌亥乾坎艮震巺離坤兊甲乙戊金丙丁己石庚辛壬二十七段多於二冪相減餘戊己癸壬寅丑卯庚辛子十段之數又半股與半股弦相乘冪二絲巳二段竹酉匏艮四段半股弦較冪一戌震二段與半句冪辰巳午未
